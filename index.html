<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nail Studio Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Our Nail Studio</h1>
        <nav>
            <ul>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#prices">Prices</a></li>
                <li><a href="#contacts">Contact Us</a></li>
                <li><a href="#booking">Book an Appointment</a></li>
            </ul>
        </nav>
    </header>

    <section id="gallery">
        <h2>Our Gallery</h2>
        <div class="gallery-grid">
            <img src="nail1.jpg" alt="Nail Art 1">
            <img src="nail2.jpg" alt="Nail Art 2">
            <img src="nail3.jpg" alt="Nail Art 3">
            <img src="nail4.jpg" alt="Nail Art 4">
        </div>
    </section>

    <section id="prices">
        <h2>Prices</h2>
        <ul>
            <li>Manicure: $20</li>
            <li>Pedicure: $25</li>
            <li>Nail Art: from $30</li>
        </ul>
    </section>

    <section id="contacts">
        <h2>Contact Us</h2>
        <p>Email: info@nailstudio.com</p>
        <p>Phone: (123) 456-7890</p>
    </section>

    <section id="booking">
        <h2>Book an Appointment</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required>

            <label for="time">Time:</label>
            <input type="time" id="time" name="time" required>

            <label for="services">Services:</label>
            <select id="services" name="services">
                <option value="manicure">Manicure</option>
                <option value="pedicure">Pedicure</option>
                <option value="nail_art">Nail Art</option>
            </select>

            <button type="submit">Book Now</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Nail Studio. All Rights Reserved.</p>
    </footer>
</body>
</html>
